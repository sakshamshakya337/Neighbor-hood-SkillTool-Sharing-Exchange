name: Node.js CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run lint
        continue-on-error: true

      - name: Build React App
        run: npm run build

      - name: Verify Express Server
        run: node --check server/server.js

      - name: Verify Express App
        run: node --check server/app.js

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: dist
